<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love World Peace</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e0f7ff, #fff0f5);
            color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 20px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
        }

        .peace {
            font-size: 4em;
            margin: 20px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #4caf50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Love World Peace</h1>

        <div class="peace">☮️</div>

        <p>
            We believe in a world where kindness replaces hatred,  
            understanding replaces conflict, and love connects every human being.
        </p>

        <p>
            Let us build a peaceful world together, step by step, hand in hand.
        </p>

        <a class="btn" href="#">Join the Peace Movement</a>
    </div>
</body>
</html>
